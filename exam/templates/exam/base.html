<!DOCTYPE html>
<html>
<head>
    <title>LuminaExam | Online System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

        <span class="navbar-brand mb-0 h1 fw-bold text-info">LuminaExam </span>

        <div>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>

            <a href="{% url 'profile' %}" class="btn btn-outline-light btn-sm">Profile</a>

            <!-- <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a> -->
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                     <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
