{% extends 'exam/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-dark text-center py-3">
                    <h4 style="color: #00d2ff; font-weight: bold;" class="mb-0">
                        <i class="fas fa-user-edit me-2"></i> Update Profile
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-4 text-center">
                            <label class="form-label d-block text-muted">Profile Picture</label>
                            <input type="file" name="profile_pic" class="form-control form-control-sm border-0 shadow-sm" style="background: #f8f9fa;">
                        </div>

                        <div class="mb-3">
                            <label class="form-label font-weight-bold">
                                {% if role == 'faculty' or role == 'admin' %} Faculty ID {% else %} Roll Number {% endif %}
                            </label>
                            <input type="text" name="roll_no" value="{{ profile.roll_no }}" class="form-control" placeholder="Enter ID/Roll No">
                        </div>

                        <div class="mb-4">
                            <label class="form-label font-weight-bold">Address</label>
                            <textarea name="address" class="form-control" rows="3" placeholder="Enter your address">{{ profile.address }}</textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-lg shadow-sm" style="background-color: #00d2ff; color: #212529; font-weight: bold;">
                                Save Changes
                            </button>
                            <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
