
{% extends 'exam/base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px; border-top: 5px solid #28a745;">
        <h3 class="mb-4 text-center">Exam: {{ exam.title }}</h3>
        <p class="text-muted text-center">Add a new question</p>
        <hr>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="fw-bold">Question Text</label>
                <textarea name="text" class="form-control" rows="3" required placeholder="Enter question..."></textarea>
            </div>
            
            <div class="row mb-3">
                <div class="col-6 mb-2"><input type="text" name="op1" class="form-control" placeholder="Option 1" required></div>
                <div class="col-6 mb-2"><input type="text" name="op2" class="form-control" placeholder="Option 2" required></div>
                <div class="col-6 mb-2"><input type="text" name="op3" class="form-control" placeholder="Option 3" required></div>
                <div class="col-6 mb-2"><input type="text" name="op4" class="form-control" placeholder="Option 4" required></div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label class="fw-bold">Correct Option (1-4)</label>
                    <input type="number" name="correct" min="1" max="4" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="fw-bold">Marks</label>
                    <input type="number" name="marks" value="1" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-3">Save Question</button>
            <a href="{% url 'faculty_dashboard' %}" class="btn btn-link w-100 text-muted mt-2 text-decoration-none">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
